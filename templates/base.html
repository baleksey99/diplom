<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный дневник</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'diary:entry_list' %}">Мой дневник</a>
            <div class="navbar-nav">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3">Привет, {{ user.username }}!</span>
                    <a class="nav-link btn btn-outline-light me-2" href="{% url 'diary:entry_list' %}">Записи</a>
            <a class="nav-link btn btn-success me-2" href="{% url 'diary:create_entry' %}">Новая запись</a>
            <a class="nav-link btn btn-outline-secondary" href="{% url 'diary:logout' %}">Выйти</a>
                {% else %}
            <a class="nav-link btn btn-outline-primary me-2" href="{% url 'diary:login' %}">Войти</a>
            <a class="nav-link btn btn-primary" href="{% url 'diary:register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
