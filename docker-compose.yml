version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: diplom_db
      POSTGRES_USER: baleksey99
      POSTGRES_PASSWORD: baleksey99
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: diplom_db
      DB_USER: baleksey99
      DB_PASSWORD: baleksey99
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
      SECRET_KEY: django-insecure-test-key

volumes:
  postgres_data: