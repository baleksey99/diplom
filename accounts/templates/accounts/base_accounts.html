{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    {% if user.is_authenticated %}
                        <div class="text-center mb-3">
                            <img src="{{ user.get_avatar_url }}"
                                 alt="{{ user.username }}"
                                 class="rounded-circle img-fluid"
                                 style="width: 100px; height: 100px; object-fit: cover;">
                            <h5 class="mt-2">{{ user.username }}</h5>
                            <p class="text-muted small">{{ user.email }}</p>
                        </div>
                        <hr>
                        <div class="list-group list-group-flush">
                            <a href="{% url 'accounts:profile' %}" class="list-group-item list-group-item-action">
                                <i class="fas fa-user"></i> My Profile
                            </a>
                            <a href="{% url 'accounts:profile_edit' %}" class="list-group-item list-group-item-action">
                                <i class="fas fa-edit"></i> Edit Profile
                            </a>
                            <a href="{% url 'accounts:password_change' %}" class="list-group-item list-group-item-action">
                                <i class="fas fa-key"></i> Change Password
                            </a>
                            <a href="{% url 'accounts:delete_account' %}" class="list-group-item list-group-item-action text-danger">
                                <i class="fas fa-trash"></i> Delete Account
                            </a>
                            <a href="{% url 'accounts:logout' %}" class="list-group-item list-group-item-action text-danger">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </div>
                    {% else %}
                        <div class="list-group list-group-flush">
                            <a href="{% url 'accounts:login' %}" class="list-group-item list-group-item-action">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </a>
                            <a href="{% url 'accounts:register' %}" class="list-group-item list-group-item-action">
                                <i class="fas fa-user-plus"></i> Register
                            </a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
        <div class="col-md-9">
            {% block accounts_content %}
            {% endblock %}
        </div>
    </div>
</div>
{% endblock %}
