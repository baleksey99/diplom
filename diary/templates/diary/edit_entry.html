{% extends 'base.html' %}

{% block content %}
<h2>{% if entry %}Редактирование записи{% else %}Новая запись{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.title.id_for_label }}" class="form-label">Заголовок</label>
        {{ form.title }}
    </div>
    <div class="mb-3">
        <label for="{{ form.content.id_for_label }}" class="form-label">Содержание</label>
        {{ form.content }}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'diary:entry_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
