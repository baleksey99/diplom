{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h1>{{ entry.title }}</h1>
        <p class="text-muted">Создано: {{ entry.created_at|date:"d.m.Y H:i" }} | Обновлено: {{ entry.updated_at|date:"d.m.Y H:i" }}</p>
        <hr>
        <div class="entry-content">{{ entry.content|linebreaks }}</div>
        <div class="mt-4">
            <a href="{% url 'diary:edit_entry' entry.pk %}" class="btn btn-success">Редактировать</a>
            <a href="{% url 'diary:entry_list' %}" class="btn btn-secondary">Назад к списку</a>
        </div>
    </div>
</div>
{% endblock %}
